<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre em Contato</title>

    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <center>
        <header class="cabecalho" style="border: 4px solid #0a3d62; padding: 10px; border-radius: 10px;">
            <nav class="cabecalho_menu">
                <a class="cabecalho_menu_link" href="index.html">Home</a>
                <a class="cabecalho_menu_link" href="about.html">Sobre Mim</a>
                <a class="cabecalho_menu_link" href="fale.html">Fale Comigo</a>
            </nav>
        </header>
    </center>

    <main class="apresentacao">

        <h2>Cadastro</h2>

        <form id="formulario">

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome">
            <span id="erroNome" class="erro"></span><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email">
            <span id="erroEmail" class="erro"></span><br><br>

            <label for="fone">Telefone:</label><br>
            <input type="tel" id="fone">
            <span id="erroFone" class="erro"></span><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem"></textarea>
            <span id="erroMensagem" class="erro"></span><br><br>

            <button type="submit">Enviar</button>

        </form>

    </main>

   
    <script>
        const form = document.getElementById("formulario");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            let nome = document.getElementById("nome").value.trim();
            let email = document.getElementById("email").value.trim();
            let fone = document.getElementById("fone").value.trim();
            let mensagem = document.getElementById("mensagem").value.trim();

            let erro = false;

            document.getElementById("erroNome").innerText = "";
            document.getElementById("erroEmail").innerText = "";
            document.getElementById("erroFone").innerText = "";
            document.getElementById("erroMensagem").innerText = "";

            if (nome === "") {
                document.getElementById("erroNome").innerText = "O nome é obrigatório";
                erro = true;
            } else if (/\d/.test(nome)) {
                document.getElementById("erroNome").innerText = "O nome não pode conter números";
                erro = true;
            }

            if (email === "") {
                document.getElementById("erroEmail").innerText = "O email é obrigatório";
                erro = true;
            }

            if (fone === "") {
                document.getElementById("erroFone").innerText = "O telefone é obrigatório";
                erro = true;
            }

            if (mensagem === "") {
                document.getElementById("erroMensagem").innerText = "A mensagem é obrigatória";
                erro = true;
            }

            if (!erro) {
                alert("Formulário enviado com sucesso!");
                form.reset();
            }
        });
    </script>

    </main>

    <footer class="rodape"
        style="border-top: 3px solid #0a3d62; padding: 10px; text-align: center; border-radius: 8px;">
        <p>Desenvolvido por Sergio Pitanga</p>
    </footer>

</body>

</html>
